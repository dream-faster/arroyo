name: Setup Rust CI
description: Prepare the runner for Rust workspace CI jobs

runs:
  using: composite
  steps:
    - uses: actions/setup-java@v3
      with:
        distribution: "temurin"
        java-version: "11"

    - name: Install Rust
      uses: dtolnay/rust-toolchain@master
      with:
        components: clippy, rustfmt
        toolchain: 1.93

    - uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          target/
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

    - uses: actions/setup-python@v5
      name: Setup Python
      with:
        python-version: "3.12"

    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 9.0.6
        run_install: |
          - recursive: true
            args: [--frozen-lockfile, --strict-peer-dependencies]

    - name: Install runner dependencies
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake clang ruby unzip postgresql libsasl2-dev netcat-openbsd mosquitto

    - name: Install OpenAPI Generator
      shell: bash
      run: |
        pnpm install @openapitools/openapi-generator-cli -g
        cd crates/arroyo-openapi && openapi-generator-cli version

    - name: Build console
      shell: bash
      run: |
        cd webui
        pnpm build

    - name: Install CI tools
      shell: bash
      run: |
        curl -LsSf https://get.nexte.st/latest/linux | tar zxf - -C "${CARGO_HOME:-$HOME/.cargo}/bin"
        wget -q https://github.com/protocolbuffers/protobuf/releases/download/v21.8/protoc-21.8-linux-x86_64.zip -O /tmp/protoc.zip
        rm -rf /tmp/protoc
        unzip -q /tmp/protoc.zip bin/protoc -d /tmp/protoc
        sudo install /tmp/protoc/bin/protoc /usr/local/bin/protoc
        curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
        wget -q https://github.com/rust-db/refinery/releases/download/0.8.7/refinery-0.8.7-x86_64-unknown-linux-musl.tar.gz -O /tmp/refinery.tgz
        rm -rf /tmp/refinery-unpack
        mkdir -p /tmp/refinery-unpack
        tar xzf /tmp/refinery.tgz -C /tmp/refinery-unpack
        install /tmp/refinery-unpack/refinery-*-musl/refinery /tmp/refinery
        REDPANDA_VERSION=25.2.7
        REDPANDA_DIR=/tmp/redpanda-${REDPANDA_VERSION}
        echo "REDPANDA_DIR=$REDPANDA_DIR" >> "$GITHUB_ENV"
        rm -rf "$REDPANDA_DIR"
        wget --progress=dot --show-progress https://vectorized-public.s3.us-west-2.amazonaws.com/releases/redpanda/${REDPANDA_VERSION}/redpanda-${REDPANDA_VERSION}-amd64.tar.gz -O /tmp/redpanda.tgz || {
          echo "Failed to download Redpanda ${REDPANDA_VERSION}" >&2
          exit 1
        }
        tar xzf /tmp/redpanda.tgz -C /tmp

    - name: Setup Postgres
      shell: bash
      run: |
        sudo systemctl start postgresql
        sudo -u postgres psql -c "CREATE USER arroyo WITH PASSWORD 'arroyo' SUPERUSER;"
        sudo -u postgres createdb arroyo
        /tmp/refinery migrate -e DATABASE_URL -p crates/arroyo-api/migrations

    - name: Setup Redpanda
      shell: bash
      run: |
        mkdir -p /tmp/redpanda-data
        cat <<'EOF' > /tmp/redpanda.yaml
        redpanda:
          data_directory: "/tmp/redpanda-data"
          seed_servers: []
          rpc_server:
            address: "0.0.0.0"
            port: 33145
          advertised_rpc_api:
            address: "127.0.0.1"
            port: 33145
          kafka_api:
            - address: "0.0.0.0"
              port: 9092
          advertised_kafka_api:
            - address: "127.0.0.1"
              port: 9092
          admin:
            address: "0.0.0.0"
            port: 9644
          developer_mode: true

        pandaproxy: {}
        schema_registry: {}

        rpk:
          tune_network: false
          tune_disk_scheduler: false
          tune_disk_nomerges: false
          tune_disk_irq: false
          tune_cpu: false
          tune_aio_events: false
          tune_clocksource: false
          tune_swappiness: false
          enable_memory_locking: false
          tune_coredump: false
          coredump_dir: "/tmp/redpanda-coredump"
        EOF

        "$REDPANDA_DIR/bin/rpk" redpanda start --config /tmp/redpanda.yaml --mode dev-container >/tmp/redpanda.log 2>&1 &
        timeout=30
        until "$REDPANDA_DIR/bin/rpk" cluster info --brokers 127.0.0.1:9092 >/tmp/redpanda-cluster-info 2>/tmp/redpanda-cluster-info.err; do
          timeout=$((timeout - 1))
          if [ $timeout -eq 0 ]; then
            echo "Redpanda failed to start within 30 seconds" >&2
            if [ -s /tmp/redpanda-cluster-info.err ]; then
              echo "--- rpk cluster info stderr ---" >&2
              cat /tmp/redpanda-cluster-info.err >&2
            fi
            echo "--- redpanda log ---" >&2
            cat /tmp/redpanda.log >&2
            exit 1
          fi
          sleep 1
        done
        echo "Redpanda is ready on localhost:9092"

    - name: Setup mosquitto
      shell: bash
      run: |
        sudo service mosquitto start
