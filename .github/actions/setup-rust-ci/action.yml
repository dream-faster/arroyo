name: Setup Rust CI
description: Prepare the runner for Rust workspace CI jobs

runs:
  using: composite
  steps:
    - uses: actions/setup-java@v3
      with:
        distribution: "temurin"
        java-version: "11"

    - name: Install Rust
      uses: dtolnay/rust-toolchain@master
      with:
        components: clippy, rustfmt
        toolchain: 1.93

    - uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          target/
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

    - uses: actions/setup-python@v5
      name: Setup Python
      with:
        python-version: "3.12"

    - name: Download shared Rust CI assets
      uses: actions/download-artifact@v4
      with:
        name: rust-ci-prep
        path: /tmp/rust-ci-prep

    - name: Extract shared Rust CI assets
      shell: bash
      run: |
        tar xzf /tmp/rust-ci-prep/rust-ci-prep.tgz -C "$GITHUB_WORKSPACE"
        echo "$GITHUB_WORKSPACE/.ci-tools/bin" >> "$GITHUB_PATH"
        echo "$GITHUB_WORKSPACE/.ci-tools/cargo-home/bin" >> "$GITHUB_PATH"

    - name: Install runner dependencies
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake clang ruby postgresql libsasl2-dev netcat-openbsd mosquitto

    - name: Setup Postgres
      shell: bash
      run: |
        sudo systemctl start postgresql
        sudo -u postgres psql -c "CREATE USER arroyo WITH PASSWORD 'arroyo' SUPERUSER;"
        sudo -u postgres createdb arroyo
        "$GITHUB_WORKSPACE/.ci-tools/bin/refinery" migrate -e DATABASE_URL -p crates/arroyo-api/migrations

    - name: Setup Kafka
      shell: bash
      run: |
        mkdir -p /tmp/kraft-combined-logs
        "$GITHUB_WORKSPACE/.ci-tools/kafka_2.13-3.9.2/bin/kafka-storage.sh" format -t 9v5PspiySuWU2l5NjTgRuA -c "$GITHUB_WORKSPACE/.ci-tools/kafka_2.13-3.9.2/config/kraft/server.properties"
        "$GITHUB_WORKSPACE/.ci-tools/kafka_2.13-3.9.2/bin/kafka-server-start.sh" -daemon "$GITHUB_WORKSPACE/.ci-tools/kafka_2.13-3.9.2/config/kraft/server.properties"

    - name: Setup mosquitto
      shell: bash
      run: |
        sudo service mosquitto start
